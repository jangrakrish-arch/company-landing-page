<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>instantBite</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<!-- 🔥 GITHUB BADGE -->
<a href="https://github.com/vishaltakkar2028" target="_blank" class="author">
    <span class="tooltip">View Source Code</span>
    <span class="badge">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png">
        vishal
    </span>
</a>

<!-- HERO -->
<header data-aos="fade-down">
    <h1>InstantBite 🍔</h1>
    <p>Delicious Food Delivered Fast</p>
    <button>Order Now</button>
</header>

<!-- FEATURES -->
<section class="features" data-aos="fade-up">
    <h2>Our Features</h2>
    <div class="container">
        <div class="box" data-aos="zoom-in">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            <h3>Fast Delivery</h3>
        </div>
        <div class="box" data-aos="zoom-in" data-aos-delay="100">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png">
            <h3>Live Tracking</h3>
        </div>
        <div class="box" data-aos="zoom-in" data-aos-delay="200">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h3>Top Restaurants</h3>
        </div>
    </div>
</section>

<!-- AREAS -->
<section class="areas" data-aos="fade-right">
    <h2>Service Areas</h2>
    <p>Delhi | Gurgaon | Noida</p>
</section>

<!-- REVIEWS -->
<section class="reviews" data-aos="fade-left">
    <h2>Customer Reviews</h2>
    <div class="container">
        <div class="box">"Amazing service!" ⭐⭐⭐⭐⭐</div>
        <div class="box">"Loved the food!" ⭐⭐⭐⭐⭐</div>
    </div>
</section>

<!-- CONTACT -->
<section class="contact" data-aos="fade-up">
    <h2>Contact Us</h2>
    <p>📞 1111111111</p>
</section>

<!-- FOOTER -->
<footer data-aos="fade-in">
    <p>© 2026 InstantBite</p>
</footer>

<!-- AOS SCRIPT -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
    duration: 1000,
    once: true
});
</script>

</body>
</html>
